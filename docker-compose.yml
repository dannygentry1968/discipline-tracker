version: '3.8'

services:
  app:
    build: .
    container_name: discipline-tracker
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - db-data:/app/backend/data
      - uploads:/app/backend/uploads
    environment:
      - NODE_ENV=production
      - PORT=3000
      - SESSION_SECRET=${SESSION_SECRET:-change-me-in-production}
      - GMAIL_CLIENT_ID=${GMAIL_CLIENT_ID:-}
      - GMAIL_CLIENT_SECRET=${GMAIL_CLIENT_SECRET:-}
      - GMAIL_REDIRECT_URI=${GMAIL_REDIRECT_URI:-https://discipline.dannygentry.com/api/gmail/callback}
      - GMAIL_SENDER=rollinghills.automation@gmail.com

  nginx:
    image: nginx:alpine
    container_name: discipline-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt
    depends_on:
      - app

  certbot:
    image: certbot/certbot
    container_name: discipline-certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"

volumes:
  db-data:
  uploads:
  certbot-etc:
  certbot-var:
