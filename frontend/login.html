<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Rolling Hills Discipline Tracker</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:linear-gradient(135deg,#8B1A1A 0%,#B22222 50%,#CD5C5C 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .login-card { background:#fff; border-radius:16px; box-shadow:0 20px 60px rgba(0,0,0,0.3); padding:48px 40px; width:400px; max-width:90vw; text-align:center; }
  .logo { font-size:48px; margin-bottom:8px; }
  h1 { font-size:22px; color:#8B1A1A; margin-bottom:4px; }
  .subtitle { color:#666; font-size:13px; margin-bottom:32px; }
  .form-group { margin-bottom:20px; text-align:left; }
  label { display:block; font-size:12px; font-weight:600; color:#333; margin-bottom:6px; text-transform:uppercase; letter-spacing:0.5px; }
  input { width:100%; padding:12px 16px; border:2px solid #e0e0e0; border-radius:10px; font-size:15px; transition:border-color 0.2s; outline:none; }
  input:focus { border-color:#8B1A1A; }
  .btn { width:100%; padding:14px; background:#8B1A1A; color:#fff; border:none; border-radius:10px; font-size:16px; font-weight:600; cursor:pointer; transition:background 0.2s; }
  .btn:hover { background:#B22222; }
  .btn:disabled { background:#ccc; cursor:not-allowed; }
  .error { color:#e74c3c; font-size:13px; margin-top:12px; display:none; }
  .error.show { display:block; }
  .footer { margin-top:24px; font-size:11px; color:#999; }
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">🦅</div>
  <h1>Rolling Hills Elementary</h1>
  <p class="subtitle">Discipline Tracking System</p>
  <form id="loginForm">
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@fsusd.org" required autocomplete="email" autofocus>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn" id="loginBtn">Sign In</button>
    <p class="error" id="error"></p>
  </form>
  <p class="footer">Fairfield-Suisun Unified School District</p>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const errEl = document.getElementById('error');
  btn.disabled = true;
  btn.textContent = 'Signing in...';
  errEl.classList.remove('show');

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value
      })
    });
    const data = await res.json();
    if (!res.ok) {
      errEl.textContent = data.error || 'Login failed';
      errEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Sign In';
      return;
    }
    // Store user info and redirect
    sessionStorage.setItem('user', JSON.stringify(data.user));
    sessionStorage.setItem('permissions', JSON.stringify(data.permissions));
    window.location.href = '/';
  } catch (err) {
    errEl.textContent = 'Connection error. Try again.';
    errEl.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
});
</script>
</body>
</html>
